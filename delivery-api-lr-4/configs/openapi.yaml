openapi: 3.0.3
info:
  title: Delivery API
  description: |
    Система управления доставкаю (аналог СДЭК/DHL).
    
    ## Аутентификация
    Защищённые эндпоинты требуют заголовок:
    ```
    Authorization: Bearer <JWT_TOKEN>
    ```
    
    ## Получение токена
    1. Зарегистрируйтесь: `POST /api/v1/users`
    2. Получите токен: `POST /api/v1/login`
    3. Используйте токен в заголовке `Authorization`
  version: 1.0.0
  contact:
    name: API Support
    email: support@delivery.api
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Auth
    description: Аутентификация пользователей
  - name: Users
    description: Управление пользователями и поиск
  - name: Properties
    description: Управление объектами доставки
  - name: Viewings
    description: Записи на просмотр объектов доставки
  - name: Docs
    description: Документация API

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен, полученный через endpoint /login

  schemas:
    # ==================== USER SCHEMAS ====================
    
    UserCreateRequest:
      type: object
      description: Запрос на создание нового пользователя
      required: [login, password, first_name, last_name, email]
      properties:
        login:
          type: string
          description: Уникальный логин пользователя для входа в систему
          minLength: 3
          maxLength: 50
          example: "john_doe"
        password:
          type: string
          description: Пароль пользователя (минимум 6 символов)
          minLength: 6
          maxLength: 100
          format: password
          example: "secure123"
        first_name:
          type: string
          description: Имя пользователя
          example: "John"
        last_name:
          type: string
          description: Фамилия пользователя
          example: "Doe"
        email:
          type: string
          description: Адрес электронной почты пользователя
          format: email
          example: "john@example.com"

    UserResponse:
      type: object
      description: Информация о пользователе в ответе API
      properties:
        id:
          type: integer
          description: Уникальный идентификатор пользователя
          format: int64
          example: 1
        login:
          type: string
          description: Логин пользователя
          example: "john_doe"
        first_name:
          type: string
          description: Имя пользователя
          example: "John"
        last_name:
          type: string
          description: Фамилия пользователя
          example: "Doe"
        email:
          type: string
          description: Адрес электронной почты
          format: email
          example: "john@example.com"
        created_at:
          type: string
          description: Дата и время создания пользователя
          format: date-time
          example: "2026-03-28T07:45:11.337294+00:00"

    # ==================== AUTH SCHEMAS ====================
    LoginRequest:
      type: object
      description: Запрос на аутентификацию пользователя для получения JWT токена
      required: [login, password]
      properties:
        login:
          type: string
          description: Логин пользователя
          example: "john_doe"
        password:
          type: string
          description: Пароль пользователя
          format: password
          example: "secure123"

    AuthResponse:
      type: object
      description: Ответ с JWT токеном после успешной аутентификации
      properties:
        access_token:
          type: string
          description: JWT токен доступа для авторизации защищённых endpoints
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
          type: string
          description: Тип токена (всегда Bearer)
          enum: [Bearer]
          example: "Bearer"
        user_id:
          type: integer
          description: Уникальный идентификатор аутентифицированного пользователя
          format: int64
          example: 1
        login:
          type: string
          description: Логин аутентифицированного пользователя
          example: "john_doe"

    AuthTokenData:
      type: object
      description: Данные аутентифицированного пользователя, извлечённые из JWT токена (внутренняя структура)
      properties:
        user_id:
          type: integer
          description: Уникальный идентификатор пользователя из токена
          format: int64
          example: 1
        login:
          type: string
          description: Логин пользователя из токена
          example: "john_doe"
        is_authenticated:
          type: boolean
          description: Флаг успешной аутентификации пользователя
          example: true

    # ==================== PROPERTY SCHEMAS ====================
    
    PropertyCreateRequest:
      type: object
      description: Запрос на создание нового объекта доставки
      required: [owner_id, type, title, city, price, status]
      properties:
        owner_id:
          type: integer
          description: Идентификатор владельца объекта доставки
          format: int64
          example: 1
        type:
          type: string
          description: Тип объекта доставки (например, apartment, house, commercial)
          example: "apartment"
        title:
          type: string
          description: Заголовок объявления об объекте доставки
          minLength: 1
          maxLength: 200
          example: "Уютная квартира в центре"
        city:
          type: string
          description: Город, в котором расположен объект
          example: "Moscow"
        address:
          description: Адрес объекта (JSON)
          example: 
            street: "ул. Тверская"
            house: "15"
            flat: "10"
        details:
          description: Дополнительные детали объекта (JSON)
          example:
            area_sqm: 80
            floor: 3
            rooms: 2
        price:
          type: number
          description: Стоимость объекта в рублях
          format: double
          minimum: 0
          example: 15000000
        features:
          description: Список особенностей или характеристик (массив строк JSON)
          example:
            - "parking"
            - "security"
            - "metro_nearby"
        status:
          type: string
          description: Статус объекта (доступен для аренды/продажи)
          enum: [active, sold, rented, archived]
          example: "active"

    PropertyResponse:
      type: object
      description: Информация об объекте доставки в ответе API
      properties:
        id:
          type: string
          description: Уникальный идентификатор объекта доставки (UUID)
          example: "a6547b912ea14ad8b0443b1d00922517"
        owner_id:
          type: integer
          description: Идентификатор владельца объекта
          format: int64
          example: 1
        type:
          type: string
          description: Тип объекта доставки
          example: "apartment"
        title:
          type: string
          description: Заголовок объявления
          example: "Уютная квартира в центре"
        city:
          type: string
          description: Город расположения объекта
          example: "Moscow"
        address:
          description: Адрес объекта (JSON)
          example:
            street: "ул. Тверская"
            house: "15"
            flat: "10"
        details:
          description: Дополнительные детали объекта (JSON)
          example:
            area_sqm: 80
            floor: 3
            rooms: 2
        price:
          type: number
          description: Стоимость объекта в рублях
          format: double
          example: 15000000
        features:
          description: Особенности объекта (JSON)
          example:
            - "parking"
            - "security"
            - "metro_nearby"
        status:
          type: string
          description: Текущий статус объекта
          enum: [active, sold, rented, archived]
          example: "active"
        created_at:
          type: string
          description: Дата и время создания записи
          format: date-time
          example: "2026-03-28T07:45:11.337294+00:00"
    
    # ==================== VIEWING SCHEMAS ====================
    
    ViewingCreateRequest:
      type: object
      description: Запрос на запись на просмотр объекта доставки
      required: [user_id, parcel_id, scheduled_time]
      properties:
        user_id:
          type: integer
          description: Идентификатор пользователя, который хочет посмотреть объект
          format: int64
          example: 2
        parcel_id:
          type: string
          description: Идентификатор объекта доставки для просмотра (UUID)
          example: "a6547b91-2ea1-4ad8-b044-3b1d00922517"
        scheduled_time:
          type: string
          description: Запланированное время просмотра
          format: date-time
          example: "2026-04-12T12:00:00.000Z"
        comment:
          description: Комментарий к записи на просмотр (JSON)
          example:
            - text: "Объект понравился"
              author: "agent"
              timestamp:
                type: string
                format: date-time
                example: "2026-04-12T12:00:00.000Z"

    ViewingResponse:
      type: object
      description: Информация о записи на просмотр в ответе API
      properties:
        id:
          type: string
          description: Уникальный идентификатор записи на просмотр (UUID)
          example: "4fe7782d-119b-44af-9076-39693b3b3560"
        parcel_id:
          type: string
          description: Идентификатор объекта доставки (UUID)
          example: "a6547b91-2ea1-4ad8-b044-3b1d00922517"
        user_id:
          type: integer
          description: Идентификатор пользователя, записавшегося на просмотр
          format: int64
          example: 2
        scheduled_time:
          type: string
          description: Запланированное время просмотра
          format: date-time
          example: "2026-03-28T07:45:11.337294+00:00"
        status:
          type: string
          description: Статус записи на просмотр
          enum: [scheduled, completed, cancelled]
          example: "scheduled"
        created_at:
          type: string
          description: Дата и время создания записи
          format: date-time
          example: "2026-03-28T07:45:11.337294+00:00"

    # ==================== ERROR SCHEMAS ====================
    
    ErrorResponse:
      type: object
      description: Стандартный формат ответа при ошибке API
      required: [code, message]
      properties:
        code:
          type: string
          description: Машинный код ошибки для программной обработки
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Человекочитаемое описание ошибки
          example: "Login and password required"
        details:
          type: object
          description: Дополнительные детали ошибки (необязательно)
          additionalProperties: true
          example: { "field": "login", "reason": "too short" }

  parameters:
    # ==================== QUERY PARAMETERS ====================
    
    # Pagination Parameters
    FromQueryParam:
      name: from
      in: query
      description: Смещение начала выборки (> 0, для пагинации)
      schema:
        type: integer
        format: int32
        default: 1
      example: 1

    ToQueryParam:
      name: to
      in: query
      description: Конечный индекс выборки (> 0, >= from, для пагинации)
      schema:
        type: integer
        format: int32
      example: 50
    
    LoginQueryParam:
      name: login
      in: query
      description: Поиск пользователя по точному совпадению логина
      schema:
        type: string
      example: "john_doe"

    NameMaskQueryParam:
      name: name_mask
      in: query
      description: Поиск по маске имени и фамилии (поддерживается * в конце)
      schema:
        type: string
      example: "Ivan*"

    CityQueryParam:
      name: city
      in: query
      description: Фильтрация объектов доставки по городу
      schema:
        type: string
      example: "Moscow"

    MinPriceQueryParam:
      name: min_price
      in: query
      description: Минимальная цена объекта для фильтрации
      schema:
        type: number
        format: double
      example: 5000000

    MaxPriceQueryParam:
      name: max_price
      in: query
      description: Максимальная цена объекта для фильтрации
      schema:
        type: number
        format: double
      example: 20000000

    PropertyIdPathParam:
      name: parcel_id
      in: path
      description: Уникальный идентификатор объекта доставки
      required: true
      schema:
        type: string
        format: string
      example: a6547b912ea14ad8b0443b1d00922517

  responses:
    # ==================== ERROR RESPONSES ====================
    
    Unauthorized:
      description: Ошибка аутентификации
      content:
        text/plain:
          schema:
            type: string
          examples:
            auth_error:
              summary: Ошибка аутентификации
              value: "Missing 'Authorization' header"
    
    Forbidden:
      description: Варификация не успешна. Доступ запрещен
      content:
        text/plain:
          schema:
            type: string
          examples:
            forbidden_error:
              summary: Ошибка доступа
              value: "Token verification failed: ..."

    Conflict:
      description: Конфликт ресурсов
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            login_exists:
              summary: Логин/почта некорректен
              value:
                code: "CONFLICT"
                message: "Login and/or email already exists"
    
    ConstraintsNotMatched:
      description: Ошибка проверки бизнес-ограничений
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            constraints_error:
              summary: Ограничения не выполнены
              value:
                code: "CONSTRAINTS_NOT_MATCHED"
                message: "Constraints are violated"

# ==================== PATHS / ENDPOINTS ====================

paths:
  # ==================== AUTH ENDPOINTS ====================
  /login:
    post:
      tags: [Auth]
      summary: Аутентификация пользователя (получение JWT токена)
      description: Проверяет учётные данные и возвращает JWT токен для доступа к защищённым endpoints. Токен действителен 1 час.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              valid:
                summary: Корректный запрос на вход
                value:
                  login: "john_doe"
                  password: "secure123"
      responses:
        '200':
          description: Успешная аутентификация, токен получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  summary: Токен успешно получен
                  value:
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    token_type: "Bearer"
                    user_id: 1
                    login: "john_doe"
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== USER ENDPOINTS ====================
  
  /users:
    post:
      tags: [Users]
      summary: Создание пользователя
      description: Создает нового пользователя.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ConstraintsNotMatched'

    get:
      tags: [Users]
      summary: Поиск пользователей
      description: |
        Поиск пользователей по критериям:
        - `?login=...` — точный поиск по логину
        - `?name_mask=...` — поиск по маске имени/фамилии
        - `?from=...&to=...` — пагинация результатов
      operationId: searchUsers
      parameters:
        - $ref: '#/components/parameters/FromQueryParam'
        - $ref: '#/components/parameters/ToQueryParam'
        - $ref: '#/components/parameters/LoginQueryParam'
        - $ref: '#/components/parameters/NameMaskQueryParam'
      responses:
        '200':
          description: Список найденных пользователей
          content:
            application/json:
              schema:
                type: array
                description: Массив объектов пользователей
                items:
                  $ref: '#/components/schemas/UserResponse'
              examples:
                by_login:
                  summary: Поиск по точному логину
                  value:
                    - id: 1
                      login: "john_doe"
                      first_name: "John"
                      last_name: "Doe"
                      email: "john@example.com"
                      created_at: "2026-03-28T07:45:11.337294+00:00"
                by_mask:
                  summary: Поиск по маске имени
                  value:
                    - id: 1
                      login: "john_doe"
                      first_name: "John"
                      last_name: "Doe"
                      email: "john@example.com"
                      created_at: "2026-03-28T07:45:11.337294+00:00"
                    - id: 2
                      login: "jane_smith"
                      first_name: "Jane"
                      last_name: "Smith"
                      email: "jane@example.com"
                      created_at: "2026-03-10T03:21:10.192837+00:00"
        '400':
          description: Ошибка в параметрах запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                login_mask:
                  summary: Неверный формат параметров запроса (login/name_mask)
                  value:
                    code: "BAD_REQUEST"
                    message: "Missing query parameter (login or name_mask)"
                pagination:
                  summary: Неверный формат параметров пагенации
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid from/to bounds!"
        '404':
          description: Запрошенный пользователь не найден (если поиск осуществлялся по логину)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                user:
                  summary: Пользователь не найден
                  value:
                    code: "NOT_FOUND"
                    message: "User not found"

  # ==================== PROPERTY ENDPOINTS ====================
  
  /properties:
    post:
      tags: [Properties]
      summary: Добавление объекта доставки
      description: Создаёт новый объект доставки. Требует аутентификации.
      operationId: createProperty
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyCreateRequest'
            examples:
              valid1:
                summary: Корректный запрос на создание объекта 1
                value:
                  owner_id: 1
                  type: "commercial"
                  title: "Офисное помещение IT"
                  city: "Moscow"
                  address:
                    street: "Leninsky Prospekt"
                    house: "45"
                    flat: "Office 301"
                  price: 500000
                  details:
                    purpose: "office"
                    area_sqm: 80
                    floor: 3
                  features:
                    - "parking"
                    - "security"
                    - "metro_nearby"
                  status: "active"
              valid2:
                summary: Корректный запрос на создание объекта 2
                value:
                  owner_id: 1
                  type: "house"
                  title: "Коттедж у моря"
                  city: "Sochi"
                  address:
                    street: "Kurortny"
                    vladenie: "5"
                    building: "2"
                  price: 40000000
                  details:
                    area_sqm: 200
                    land_area_sqm: 500
                    has_pool: true
                    floors: 3
                  features:
                    - "pool"
                    - "sea_view"
                  status: "active"
      responses:
        '201':
          description: Объект успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
              examples:
                created:
                  summary: Успешное создание объекта
                  value:
                    id: "a6547b912ea14ad8b0443b1d00922517"
                    owner_id: 1
                    type: "commercial"
                    title: "Офисное помещение IT"
                    city: "Moscow"
                    address:
                      street: "Leninsky Prospekt"
                      house: "45"
                      flat: "Office 301"
                    details:
                      purpose: "office"
                      area_sqm: 80
                      floor: 3
                    price: 500000
                    features:
                      - "parking"
                      - "security"
                      - "metro_nearby"
                    status: "active"
                    created_at: "2026-04-12T15:48:05.918+00:00"
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Запрошенный владелец не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                owner:
                  summary: Владелец доставки не найден
                  value:
                    code: "NOT_FOUND"
                    message: "Owner not found"
        '422':
          $ref: '#/components/responses/ConstraintsNotMatched'

    get:
      tags: [Properties]
      summary: Поиск объектов доставки
      description: |
        Поиск объектов по критериям:
        - `?city=...` — фильтрация по городу
        - `?min_price=...&max_price=...` — фильтрация по диапазону цен
        - `?from=...&to=...` — пагинация результатов
      operationId: searchProperties
      parameters:
        - $ref: '#/components/parameters/FromQueryParam'
        - $ref: '#/components/parameters/ToQueryParam'
        - $ref: '#/components/parameters/CityQueryParam'
        - $ref: '#/components/parameters/MinPriceQueryParam'
