  # ==================== VIEWING ENDPOINTS ====================
  
  /properties/{parcel_id}/viewings:
    post:
      tags: [Viewings]
      summary: Запись на просмотр объекта
      description: Создаёт запись на посещение объекта доставки. Требует аутентификации.
      operationId: createViewing
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PropertyIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewingCreateRequest'
            examples:
              valid:
                summary: Неверный формат параметров запроса (city/min_price/max_price)
                value:
                  parcel_id: "a6547b912ea14ad8b0443b1d00922517"
                  user_id: 1
                  scheduled_time: "2026-05-10T12:00:00Z"
                  comments:
                    - text: "Объект понравился"
                      author: "agent"
                      timestamp: "2026-04-12T12:00:00.000Z"
      responses:
        '201':
          description: Запись на просмотр успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewingResponse'
              examples:
                created:
                  summary: Успешная запись на просмотр
                  value:
                    id: "4fe7782d119b44af907639693b3b3560"
                    parcel_id: "a6547b912ea14ad8b0443b1d00922517"
                    user_id: 1
                    scheduled_time: "2026-05-10T12:00:00+00:00"
                    status: "pending"
                    comments:
                      - text: "Объект понравился"
                        author: "agent"
                        timestamp: "2026-04-12T19:35:12.062+00:00"
                      - text: "Перенос времени на 2026-05-12"
                        author: "agent"
                        timestamp: "2026-04-12T20:14:17.012+00:00"
                    created_at: "2026-04-12T19:35:12.062+00:00"
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
                id_mismatch:
                  summary: Несовпадение parcel_id
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Property id mismatch" 
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Недвижимость не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                parcel_not_exists:
                  summary: Недвижимость не найдена
                  value:
                    code: "NOT_FOUND"
                    message: "Property not found"
        '422':
          $ref: '#/components/responses/ConstraintsNotMatched'

