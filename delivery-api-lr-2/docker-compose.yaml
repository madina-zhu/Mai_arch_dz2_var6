services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: userver_delivery_api
    ports:
      - "8080:8080"
    environment:
      - USERVER_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s