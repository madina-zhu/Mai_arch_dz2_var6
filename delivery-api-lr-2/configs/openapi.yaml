openapi: 3.0.3
info:
  title: Delivery API
  description: |
    Система управления доставкаю (аналог СДЭК/DHL).
    
    ## Аутентификация
    Защищённые эндпоинты требуют заголовок:
    ```
    Authorization: Bearer <JWT_TOKEN>
    ```
    
    ## Получение токена
    1. Зарегистрируйтесь: `POST /api/v1/register`
    2. Получите токен: `POST /api/v1/login`
    3. Используйте токен в заголовке `Authorization`
  version: 1.0.0
  contact:
    name: API Support
    email: support@delivery.api
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Auth
    description: Аутентификация и регистрация пользователей
  - name: Users
    description: Управление пользователями и поиск
  - name: Properties
    description: Управление объектами доставки
  - name: Viewings
    description: Записи на просмотр объектов доставки
  - name: Docs
    description: Документация API

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен, полученный через endpoint /login

  schemas:
    # ==================== USER SCHEMAS ====================
    
    UserCreateRequest:
      type: object
      description: Запрос на создание нового пользователя
      required: [login, password, first_name, last_name, email]
      properties:
        login:
          type: string
          description: Уникальный логин пользователя для входа в систему
          minLength: 3
          maxLength: 50
          example: "john_doe"
        password:
          type: string
          description: Пароль пользователя (минимум 6 символов)
          minLength: 6
          maxLength: 100
          format: password
          example: "secure123"
        first_name:
          type: string
          description: Имя пользователя
          example: "John"
        last_name:
          type: string
          description: Фамилия пользователя
          example: "Doe"
        email:
          type: string
          description: Адрес электронной почты пользователя
          format: email
          example: "john@example.com"

    UserResponse:
      type: object
      description: Информация о пользователе в ответе API
      properties:
        id:
          type: integer
          description: Уникальный идентификатор пользователя
          format: int64
          example: 1
        login:
          type: string
          description: Логин пользователя
          example: "john_doe"
        first_name:
          type: string
          description: Имя пользователя
          example: "John"
        last_name:
          type: string
          description: Фамилия пользователя
          example: "Doe"
        email:
          type: string
          description: Адрес электронной почты
          format: email
          example: "john@example.com"
        created_at:
          type: string
          description: Дата и время создания пользователя в формате ISO 8601
          format: date-time
          example: "2024-01-15T10:00:00Z"

    # ==================== AUTH SCHEMAS ====================
    
    RegisterRequest:
      type: object
      description: Запрос на регистрацию нового пользователя
      allOf:
        - $ref: '#/components/schemas/UserCreateRequest'

    LoginRequest:
      type: object
      description: Запрос на аутентификацию пользователя для получения JWT токена
      required: [login, password]
      properties:
        login:
          type: string
          description: Логин пользователя
          example: "john_doe"
        password:
          type: string
          description: Пароль пользователя
          format: password
          example: "secure123"

    AuthResponse:
      type: object
      description: Ответ с JWT токеном после успешной аутентификации
      properties:
        access_token:
          type: string
          description: JWT токен доступа для авторизации защищённых endpoints
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
          type: string
          description: Тип токена (всегда Bearer)
          enum: [Bearer]
          example: "Bearer"
        user_id:
          type: integer
          description: Уникальный идентификатор аутентифицированного пользователя
          format: int64
          example: 1
        login:
          type: string
          description: Логин аутентифицированного пользователя
          example: "john_doe"

    AuthTokenData:
      type: object
      description: Данные аутентифицированного пользователя, извлечённые из JWT токена (внутренняя структура)
      properties:
        user_id:
          type: integer
          description: Уникальный идентификатор пользователя из токена
          format: int64
          example: 1
        login:
          type: string
          description: Логин пользователя из токена
          example: "john_doe"
        is_authenticated:
          type: boolean
          description: Флаг успешной аутентификации пользователя
          example: true

    # ==================== PROPERTY SCHEMAS ====================
    
    PropertyCreateRequest:
      type: object
      description: Запрос на создание нового объекта доставки
      required: [owner_id, title, city, price, status]
      properties:
        owner_id:
          type: integer
          description: Идентификатор владельца объекта доставки
          format: int64
          example: 1
        title:
          type: string
          description: Заголовок объявления об объекте доставки
          minLength: 1
          maxLength: 200
          example: "Уютная квартира в центре"
        description:
          type: string
          description: Подробное описание объекта доставки
          maxLength: 2000
          example: "Светлая 2-комнатная квартира с ремонтом"
        city:
          type: string
          description: Город, в котором расположен объект
          example: "Moscow"
        address:
          type: string
          description: Полный адрес объекта доставки
          example: "ул. Тверская, 15"
        price:
          type: number
          description: Стоимость объекта в рублях
          format: double
          minimum: 0
          example: 15000000
        status:
          type: string
          description: Статус объекта (доступен для аренды/продажи)
          enum: [active, sold, rented, archived]
          example: "active"

    PropertyResponse:
      type: object
      description: Информация об объекте доставки в ответе API
      properties:
        id:
          type: integer
          description: Уникальный идентификатор объекта доставки
          format: int64
          example: 1
        owner_id:
          type: integer
          description: Идентификатор владельца объекта
          format: int64
          example: 1
        title:
          type: string
          description: Заголовок объявления
          example: "Уютная квартира в центре"
        city:
          type: string
          description: Город расположения объекта
          example: "Moscow"
        price:
          type: number
          description: Стоимость объекта в рублях
          format: double
          example: 15000000
        status:
          type: string
          description: Текущий статус объекта
          enum: [active, sold, rented, archived]
          example: "active"
        created_at:
          type: string
          description: Дата и время создания записи в формате ISO 8601
          format: date-time
          example: "2024-01-15T10:00:00Z"

    # ==================== VIEWING SCHEMAS ====================
    
    ViewingCreateRequest:
      type: object
      description: Запрос на запись на просмотр объекта доставки
      required: [user_id, parcel_id, scheduled_time]
      properties:
        user_id:
          type: integer
          description: Идентификатор пользователя, который хочет посмотреть объект
          format: int64
          example: 2
        parcel_id:
          type: integer
          description: Идентификатор объекта доставки для просмотра
          format: int64
          example: 1
        scheduled_time:
          type: string
          description: Запланированное время просмотра в формате ISO 8601
          format: date-time
          example: "2024-02-01T14:00:00Z"
        comment:
          type: string
          description: Комментарий к записи на просмотр (необязательно)
          maxLength: 500
          example: "Хочу посмотреть кухню и балкон"

    ViewingResponse:
      type: object
      description: Информация о записи на просмотр в ответе API
      properties:
        id:
          type: integer
          description: Уникальный идентификатор записи на просмотр
          format: int64
          example: 501
        parcel_id:
          type: integer
          description: Идентификатор объекта доставки
          format: int64
          example: 1
        user_id:
          type: integer
          description: Идентификатор пользователя, записавшегося на просмотр
          format: int64
          example: 2
        scheduled_time:
          type: string
          description: Запланированное время просмотра
          format: date-time
          example: "2024-02-01T14:00:00Z"
        status:
          type: string
          description: Статус записи на просмотр
          enum: [scheduled, completed, cancelled]
          example: "scheduled"

    # ==================== ERROR SCHEMAS ====================
    
    ErrorResponse:
      type: object
      description: Стандартный формат ответа при ошибке API
      required: [code, message]
      properties:
        code:
          type: string
          description: Машинный код ошибки для программной обработки
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Человекочитаемое описание ошибки
          example: "Login and password required"
        details:
          type: object
          description: Дополнительные детали ошибки (необязательно)
          additionalProperties: true
          example: { "field": "login", "reason": "too short" }

  parameters:
    # ==================== QUERY PARAMETERS ====================
    
    LoginQueryParam:
      name: login
      in: query
      description: Поиск пользователя по точному совпадению логина
      schema:
        type: string
      example: "john_doe"

    NameMaskQueryParam:
      name: name_mask
      in: query
      description: Поиск по маске имени и фамилии (поддерживается * в конце)
      schema:
        type: string
      example: "Ivan*"

    CityQueryParam:
      name: city
      in: query
      description: Фильтрация объектов доставки по городу
      schema:
        type: string
      example: "Moscow"

    MinPriceQueryParam:
      name: min_price
      in: query
      description: Минимальная цена объекта для фильтрации
      schema:
        type: number
        format: double
      example: 5000000

    MaxPriceQueryParam:
      name: max_price
      in: query
      description: Максимальная цена объекта для фильтрации
      schema:
        type: number
        format: double
      example: 20000000

    PropertyIdPathParam:
      name: parcel_id
      in: path
      description: Уникальный идентификатор объекта доставки
      required: true
      schema:
        type: integer
        format: int64
      example: 1

  responses:
    # ==================== ERROR RESPONSES ====================
    
    Unauthorized:
      description: Ошибка аутентификации, аутентификация не пройдена или токен невалиден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            auth_error:
              summary: Ошибка аутентификации
              value:
                code: "UNAUTHORIZED"
                message: "Invalid credentials"
    
    Forbidden:
      description: Доступ запрещен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden_error:
              summary: Ошибка доступа
              value:
                code: "FORBIDDEN"
                message: "Token processing error: ..."

    Conflict:
      description: Конфликт ресурсов
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            login_exists:
              summary: Логин некорректен
              value:
                code: "CONFLICT"
                message: "Login already exists"

# ==================== PATHS / ENDPOINTS ====================

paths:
  # ==================== AUTH ENDPOINTS ====================
  
  /register:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      description: Создаёт нового пользователя в системе. После регистрации необходимо войти через /login для получения токена.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              valid:
                summary: Корректный запрос на регистрацию
                value:
                  login: "john_doe"
                  password: "secure123"
                  first_name: "John"
                  last_name: "Doe"
                  email: "john@example.com"
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                created:
                  summary: Успешная регистрация
                  value:
                    id: 1
                    login: "john_doe"
                    first_name: "John"
                    last_name: "Doe"
                    email: "john@example.com"
                    created_at: "2024-01-15T10:00:00Z"
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
        '409':
          $ref: '#/components/responses/Conflict'

  /login:
    post:
      tags: [Auth]
      summary: Аутентификация пользователя (получение JWT токена)
      description: Проверяет учётные данные и возвращает JWT токен для доступа к защищённым endpoints. Токен действителен 1 час.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              valid:
                summary: Корректный запрос на вход
                value:
                  login: "john_doe"
                  password: "secure123"
      responses:
        '200':
          description: Успешная аутентификация, токен получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  summary: Токен успешно получен
                  value:
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    token_type: "Bearer"
                    user_id: 1
                    login: "john_doe"
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== USER ENDPOINTS ====================
  
  /users:
    post:
      tags: [Users]
      summary: Создание пользователя
      description: Создает нового пользователя (альтернативный endpoint, требует аутентификации, для служебных целей, /register предпочтительнее).
      operationId: createUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

    get:
      tags: [Users]
      summary: Поиск пользователей
      description: |
        Поиск пользователей по критериям:
        - `?login=...` — точный поиск по логину
        - `?name_mask=...` — поиск по маске имени/фамилии
      operationId: searchUsers
      parameters:
        - $ref: '#/components/parameters/LoginQueryParam'
        - $ref: '#/components/parameters/NameMaskQueryParam'
      responses:
        '200':
          description: Список найденных пользователей
          content:
            application/json:
              schema:
                type: array
                description: Массив объектов пользователей
                items:
                  $ref: '#/components/schemas/UserResponse'
              examples:
                by_login:
                  summary: Поиск по точному логину
                  value:
                    - id: 1
                      login: "john_doe"
                      first_name: "John"
                      last_name: "Doe"
                      email: "john@example.com"
                      created_at: "2024-01-15T10:00:00Z"
                by_mask:
                  summary: Поиск по маске имени
                  value:
                    - id: 1
                      login: "john_doe"
                      first_name: "John"
                      last_name: "Doe"
                      email: "john@example.com"
                      created_at: "2024-01-15T10:00:00Z"
                    - id: 2
                      login: "jane_smith"
                      first_name: "Jane"
                      last_name: "Smith"
                      email: "jane@example.com"
                      created_at: "2024-01-16T11:00:00Z"
        '400':
          description: Ошибка в параметрах запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Неверный формат параметров запроса
                  value:
                    code: "BAD_REQUEST"
                    message: "Missing query parameter (login or name_mask)"
        '404':
          description: Запрошенный пользователь не найден (если поиск осуществлялся по логину)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                user:
                  summary: Пользователь не найден
                  value:
                    code: "NOT_FOUND"
                    message: "User not found"

  # ==================== PROPERTY ENDPOINTS ====================
  
  /properties:
    post:
      tags: [Properties]
      summary: Добавление объекта доставки
      description: Создаёт новый объект доставки. Требует аутентификации.
      operationId: createProperty
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyCreateRequest'
            examples:
              valid:
                summary: Корректный запрос на создание объекта
                value:
                  owner_id: 1
                  title: "Уютная квартира в центре"
                  description: "Светлая 2-комнатная квартира с ремонтом"
                  city: "Moscow"
                  address: "ул. Тверская, 15"
                  price: 15000000
                  status: "active"
      responses:
        '201':
          description: Объект успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
              examples:
                created:
                  summary: Успешное создание объекта
                  value:
                    id: 1
                    owner_id: 1
                    title: "Уютная квартира в центре"
                    city: "Moscow"
                    price: 15000000
                    status: "active"
                    created_at: "2024-01-15T10:00:00Z"
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Запрошенный владелец не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                owner:
                  summary: Владелец доставки не найден
                  value:
                    code: "NOT_FOUND"
                    message: "Owner not found"

    get:
      tags: [Properties]
      summary: Поиск объектов доставки
      description: |
        Поиск объектов по критериям:
        - `?city=...` — фильтрация по городу
        - `?min_price=...&max_price=...` — фильтрация по диапазону цен
      operationId: searchProperties
      parameters:
        - $ref: '#/components/parameters/CityQueryParam'
        - $ref: '#/components/parameters/MinPriceQueryParam'
        - $ref: '#/components/parameters/MaxPriceQueryParam'
      responses:
        '200':
          description: Список найденных объектов доставки
          content:
            application/json:
              schema:
                type: array
                description: Массив объектов доставки
                items:
                  $ref: '#/components/schemas/PropertyResponse'
              examples:
                by_city:
                  summary: Поиск объектов по городу
                  value:
                    - id: 1
                      owner_id: 1
                      title: "Уютная квартира в центре"
                      city: "Moscow"
                      price: 15000000
                      status: "active"
                      created_at: "2024-01-15T10:00:00Z"
                    - id: 2
                      owner_id: 2
                      title: "Дом за городом"
                      city: "Moscow"
                      price: 25000000
                      status: "active"
                      created_at: "2024-01-16T12:00:00Z"
                by_price:
                  summary: Поиск объектов по диапазону цен
                  value:
                    - id: 1
                      owner_id: 1
                      title: "Уютная квартира в центре"
                      city: "Moscow"
                      price: 15000000
                      status: "active"
                      created_at: "2024-01-15T10:00:00Z"
        '400':
          description: Ошибка в параметрах запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Неверный формат параметров запроса
                  value:
                    code: "BAD_REQUEST"
                    message: "Missing query parameters (city or min_price/max_price)"

  # ==================== VIEWING ENDPOINTS ====================
  
  /properties/{parcel_id}/viewings:
    post:
      tags: [Viewings]
      summary: Запись на просмотр объекта
      description: Создаёт запись на посещение объекта доставки. Требует аутентификации.
      operationId: createViewing
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PropertyIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewingCreateRequest'
            examples:
              valid:
                summary: Корректный запрос на запись
                value:
                  user_id: 1
                  parcel_id: 1
                  scheduled_time: "2024-02-01T14:00:00Z"
                  comment: "Хочу посмотреть кухню и балкон"
      responses:
        '201':
          description: Запись на просмотр успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewingResponse'
              examples:
                created:
                  summary: Успешная запись на просмотр
                  value:
                    id: 1
                    parcel_id: 1
                    user_id: 1
                    scheduled_time: "2024-02-01T14:00:00Z"
                    status: "scheduled"
        '400':
          description: Ошибка валидации входных данных запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  summary: Ошибка валидации полей
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Invalid request body"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

