components_manager:
  task_processors:
    main-task-processor:
      worker_threads: 4
    fs-task-processor:
      worker_threads: 2
  default_task_processor: main-task-processor

  components:
    dynamic-config:
      defaults:
        POSTGRES_DEFAULT_COMMAND_CONTROL:
          network_timeout_ms: 600000
          statement_timeout_ms: 600000
          prepared_statements_enabled: true
      fs-task-processor: fs-task-processor
      load-enabled: true
      updates-enabled: false
    
    db-postgresql:
      dbconnection: "postgresql://api_user:password_123@postgres:5432/delivery_db"
    
    mongo:
      dbconnection: "mongodb://admin:password@mongodb:27017/mongo_delivery_db?authSource=admin"

    testsuite-support:
      load-enabled: true
    
    dns-client:
      load-enabled: true
      fs-task-processor: fs-task-processor

    logging:
      load-enabled: true
      fs-task-processor: main-task-processor
      loggers:
        default:
          level: info
          file_path: logs/server.log

    server:
      load-enabled: true
      listener:
        port: 8080
        address: 0.0.0.0
        task_processor: main-task-processor

    handler-ping:
      path: /api/v1/ping
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-create-parcel:
      path: /api/v1/parcels
      method: POST
      auth:
        types:
          - jwt-auth
      task_processor: fs-task-processor

    handler-create-user:
      path: /api/v1/users
      method: POST
      task_processor: fs-task-processor

    handler-create-delivery:
      path: /api/v1/deliveries
      method: POST
      auth:
        types:
          - jwt-auth
      task_processor: fs-task-processor

    handler-get-parcels:
      path: /api/v1/parcels
      method: GET
      task_processor: fs-task-processor

    handler-get-deliveries:
      path: /api/v1/deliveries
      method: GET
      task_processor: fs-task-processor

    handler-get-users:
      path: /api/v1/users
      method: GET
      task_processor: fs-task-processor

    handler-login:
      path: /api/v1/login
      method: POST
      task_processor: fs-task-processor

    handler-openapi-spec:
      path: /api/v1/docs/openapi.yaml
      method: GET
      task_processor: fs-task-processor
      spec_file_path: "./configs/openapi.yaml"

    handler-swagger-ui:
      path: /api/v1/docs
      method: GET
      task_processor: fs-task-processor

    postgres-storage-component:
      load-enabled: true
    
    mongo-storage-component:
      load-enabled: true

    auth-component:
      secret_key: "my-secret-key"
      token_lifetime: 3600

    jwt-auth-checker:
      load-enabled: true
      secret: "my-secret-key"